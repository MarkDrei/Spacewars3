databases:
  - name: spacewars-db
    databaseName: spacewars_production
    user: spacewars_user
    plan: free
    version: "16"

services:
  - type: web
    name: spacewars-nextjs
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start -- -H 0.0.0.0
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: POSTGRES_HOST
        fromDatabase:
          name: spacewars-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: spacewars-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: spacewars-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: spacewars-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: spacewars-db
          property: password
      # Email configuration (optional — set EMAIL_ENABLED=true and configure SMTP to enable)
      - key: EMAIL_ENABLED
        value: "false"
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: SMTP_FROM
        value: ""
      - key: NEXT_PUBLIC_BASE_URL
        value: ""
    healthCheckPath: /
    domains:
      - spacewars-nextjs.onrender.com
