name: Update Screenshots

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  screenshots:
    name: Generate and commit screenshots
    runs-on: ubuntu-latest

    permissions:
      contents: write # needed to push the updated screenshots back

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spacewars
          POSTGRES_PASSWORD: spacewars
          POSTGRES_DB: spacewars
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use a token with write access so the auto-commit step can push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: spacewars
          POSTGRES_USER: spacewars
          POSTGRES_PASSWORD: spacewars
          SESSION_SECRET: ci-screenshot-secret

      - name: Start application
        run: |
          npm run start &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: spacewars
          POSTGRES_USER: spacewars
          POSTGRES_PASSWORD: spacewars
          SESSION_SECRET: ci-screenshot-secret

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server at http://localhost:3000 ..."
          for i in {1..30}; do
            if curl --fail --silent http://localhost:3000 > /dev/null; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Attempt $i/30: not ready yet, waiting 2s..."
            sleep 2
          done
          echo "Server did not start in time" && exit 1

      - name: Generate screenshots
        run: npm run screenshots
        env:
          SCREENSHOT_BASE_URL: http://localhost:3000

      - name: Stop application
        if: always()
        run: kill "$SERVER_PID" || true

      - name: Commit and push screenshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update screenshots [skip ci]"
          file_pattern: "docs/screenshots/*.png"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
