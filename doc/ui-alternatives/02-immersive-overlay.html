<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design 2: Immersive Overlay HUD</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    color: #ededed;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Thin top nav */
  .topbar {
    background: rgba(0,0,0,0.7);
    border-bottom: 1px solid rgba(76,175,80,0.2);
    padding: 0 16px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(8px);
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }
  .topbar .logo { color: #4caf50; font-weight: 700; font-size: 0.95rem; letter-spacing: 2px; }
  .topbar nav { display: flex; gap: 18px; }
  .topbar nav a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.8rem; }
  .topbar nav a.active { color: #4caf50; }

  /* Canvas fills viewport */
  .canvas-wrapper {
    flex: 1;
    position: relative;
    background: #050510;
    overflow: hidden;
  }
  .canvas-placeholder {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
  }

  /* Decorative elements */
  .star { position: absolute; background: rgba(255,255,255,0.7); border-radius: 50%; }
  .nebula {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.12;
  }
  .ship-marker {
    position: absolute; top: 52%; left: 50%;
    transform: translate(-50%, -50%);
    width: 0; height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-bottom: 24px solid #4caf50;
    filter: drop-shadow(0 0 8px #4caf50);
  }
  .traj-line {
    position: absolute; top: 52%; left: 50%;
    width: 180px; height: 1px;
    background: linear-gradient(90deg, rgba(76,175,80,0.6), transparent);
    transform-origin: left center;
    transform: rotate(-30deg);
  }
  .range-circle {
    position: absolute; top: 52%; left: 50%;
    width: 200px; height: 200px;
    transform: translate(-50%, -50%);
    border: 1px dashed rgba(76,175,80,0.2);
    border-radius: 50%;
  }

  /* ─── FLOATING HUD PANELS ─── */
  .hud-panel {
    position: absolute;
    background: rgba(5,5,20,0.75);
    border: 1px solid rgba(76,175,80,0.25);
    border-radius: 10px;
    backdrop-filter: blur(12px);
    padding: 12px 14px;
    min-width: 190px;
  }
  .hud-panel h4 {
    color: #4caf50;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .hud-panel h4::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: #4caf50;
    border-radius: 50%;
    box-shadow: 0 0 6px #4caf50;
  }

  /* Nav Panel — bottom left */
  .panel-nav { bottom: 60px; left: 20px; }

  /* Teleport Panel — bottom right */
  .panel-teleport { bottom: 60px; right: 20px; }

  /* Settings chip — top right under nav */
  .panel-settings {
    top: 54px; right: 20px;
    min-width: 140px;
    padding: 8px 12px;
  }

  /* Attack chip — top left under nav */
  .panel-combat {
    top: 54px; left: 20px;
    min-width: 140px;
    padding: 8px 12px;
  }

  /* Field styles */
  .hud-field { margin-bottom: 8px; }
  .hud-field-label { color: #666; font-size: 0.7rem; margin-bottom: 3px; }
  .hud-row { display: flex; gap: 6px; align-items: center; }
  input[type=number] {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(76,175,80,0.3);
    color: #e0e0e0;
    padding: 5px 8px;
    border-radius: 4px;
    font-size: 0.82rem;
    width: 70px;
  }
  input[type=number]:focus { outline: none; border-color: #4caf50; }
  .btn {
    padding: 5px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .btn-green { background: #4caf50; color: #fff; }
  .btn-red { background: #c62828; color: #fff; }
  .btn-outline {
    background: transparent;
    border: 1px solid rgba(76,175,80,0.5);
    color: #4caf50;
  }
  .btn-sm { padding: 3px 8px; font-size: 0.72rem; }
  .btn-block { width: 100%; margin-top: 6px; padding: 6px; }

  /* Charges */
  .charges-bar {
    height: 4px;
    background: rgba(76,175,80,0.15);
    border-radius: 2px;
    margin: 6px 0;
    overflow: hidden;
  }
  .charges-fill {
    height: 100%;
    width: 60%;
    background: #4caf50;
    border-radius: 2px;
    box-shadow: 0 0 6px #4caf50;
  }
  .charges-label { color: #888; font-size: 0.72rem; display: flex; justify-content: space-between; }

  /* Toggle */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .toggle-label { color: #aaa; font-size: 0.78rem; }
  .pill {
    width: 34px; height: 18px;
    background: #333; border-radius: 9px;
    position: relative; cursor: pointer; border: 1px solid #555;
    flex-shrink: 0;
  }
  .pill.on { background: #4caf50; border-color: #4caf50; }
  .pill::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    background: #fff; border-radius: 50%;
    top: 2px; left: 2px;
    transition: transform 0.2s;
  }
  .pill.on::after { transform: translateX(16px); }

  /* Bottom status bar */
  .status-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 42px;
    background: rgba(0,0,0,0.7);
    border-top: 1px solid rgba(76,175,80,0.15);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 24px;
    font-size: 0.78rem;
    color: #555;
  }
  .status-item { display: flex; gap: 6px; align-items: center; }
  .status-value { color: #ccc; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <span class="logo">⚡ SPACEWARS</span>
  <nav>
    <a href="#">Home</a>
    <a href="#" class="active">Game</a>
    <a href="#">Research</a>
    <a href="#">Profile</a>
  </nav>
</div>

<!-- Fullscreen canvas -->
<div class="canvas-wrapper">
  <div class="canvas-placeholder">
    <div class="nebula" style="width:500px;height:400px;background:#1a4a8a;top:10%;left:20%"></div>
    <div class="nebula" style="width:300px;height:300px;background:#4a1a8a;top:50%;left:60%"></div>
    <div class="star" style="width:2px;height:2px;top:5%;left:15%"></div>
    <div class="star" style="width:1px;height:1px;top:18%;left:42%"></div>
    <div class="star" style="width:2px;height:2px;top:30%;left:78%"></div>
    <div class="star" style="width:1px;height:1px;top:62%;left:28%"></div>
    <div class="star" style="width:2px;height:2px;top:75%;left:55%"></div>
    <div class="star" style="width:1px;height:1px;top:88%;left:82%"></div>
    <div class="star" style="width:2px;height:2px;top:42%;left:10%"></div>
    <div class="range-circle"></div>
    <div class="ship-marker"></div>
    <div class="traj-line"></div>
  </div>

  <!-- Combat toggle (top left under nav) -->
  <div class="hud-panel panel-combat">
    <h4>Combat</h4>
    <div class="toggle-row">
      <span class="toggle-label">Attack on click</span>
      <div class="pill"></div>
    </div>
  </div>

  <!-- Settings (top right under nav) -->
  <div class="hud-panel panel-settings">
    <h4>View</h4>
    <div class="toggle-row">
      <span class="toggle-label">Debug overlay</span>
      <div class="pill on"></div>
    </div>
  </div>

  <!-- Navigation panel (bottom left) -->
  <div class="hud-panel panel-nav">
    <h4>Navigation</h4>
    <div class="hud-field">
      <div class="hud-field-label">Speed</div>
      <div class="hud-row">
        <input type="number" value="24.5">
        <button class="btn btn-green btn-sm">Set</button>
        <button class="btn btn-red btn-sm">Stop</button>
      </div>
    </div>
    <div class="hud-field">
      <div class="hud-field-label">Heading °</div>
      <div class="hud-row">
        <input type="number" value="135.0">
        <button class="btn btn-green btn-sm">Set</button>
      </div>
    </div>
    <button class="btn btn-outline btn-block btn-sm">⬆ Set Max Speed</button>
  </div>

  <!-- Teleport panel (bottom right) -->
  <div class="hud-panel panel-teleport">
    <h4>Teleport</h4>
    <div class="charges-label">
      <span>Charges</span>
      <span>3 / 5 — next in 2m 14s</span>
    </div>
    <div class="charges-bar"><div class="charges-fill"></div></div>
    <div class="hud-field" style="margin-top:8px">
      <div class="hud-field-label">Destination</div>
      <div class="hud-row">
        <span style="color:#666;font-size:0.72rem">X</span>
        <input type="number" value="2450">
        <span style="color:#666;font-size:0.72rem">Y</span>
        <input type="number" value="1870">
      </div>
    </div>
    <div class="hud-row" style="margin-top:6px; gap:6px">
      <button class="btn btn-green btn-sm" style="flex:1">Teleport</button>
      <button class="btn btn-outline btn-sm">Click Mode</button>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-item">
      <div class="status-dot"></div>
      <span>Connected</span>
    </div>
    <div class="status-item">
      <span>Speed:</span><span class="status-value">24.5</span>
    </div>
    <div class="status-item">
      <span>Heading:</span><span class="status-value">135°</span>
    </div>
    <div class="status-item">
      <span>Pos:</span><span class="status-value">2,450 × 1,870</span>
    </div>
    <div class="status-item" style="margin-left:auto">
      <span>Data age:</span><span class="status-value" style="color:#4caf50">1.2s</span>
    </div>
  </div>
</div>

</body>
</html>
