<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design 10: Alien Bioluminescent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #00e5cc;
    --purple: #aa44ff;
    --deep-purple: #5500cc;
    --cyan: #00ccff;
    --bg: #020410;
    --bg2: #04081a;
    --bg3: #060c22;
    --teal-glow: rgba(0,229,204,0.2);
    --purple-glow: rgba(170,68,255,0.2);
    --text: #c0e8f0;
    --dim: #406070;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column;
    overflow-x: hidden;
  }

  /* Ambient background blobs */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.08;
    pointer-events: none;
    animation: drift 12s ease-in-out infinite;
  }
  @keyframes drift {
    0%,100% { transform: translate(0, 0); }
    33% { transform: translate(20px, -30px); }
    66% { transform: translate(-15px, 15px); }
  }

  /* Header */
  .al-header {
    background: rgba(2,4,16,0.9);
    border-bottom: 1px solid rgba(0,229,204,0.15);
    padding: 0 20px;
    height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    backdrop-filter: blur(10px);
  }
  .al-logo {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--teal);
    text-shadow: 0 0 12px var(--teal);
    display: flex; align-items: center; gap: 8px;
  }
  .al-logo::before {
    content: '✦';
    animation: rotate 4s linear infinite;
    display: inline-block;
  }
  @keyframes rotate { to { transform: rotate(360deg); } }
  .al-nav { display: flex; gap: 6px; }
  .al-nav a {
    color: var(--dim);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .al-nav a:hover { color: var(--teal); background: var(--teal-glow); }
  .al-nav a.active {
    color: var(--teal);
    background: var(--teal-glow);
    box-shadow: 0 0 12px rgba(0,229,204,0.2);
  }

  /* Main body */
  .al-body {
    flex: 1;
    display: flex;
    min-height: 0;
    padding: 14px;
    gap: 14px;
    position: relative;
    z-index: 1;
  }

  /* Left / Right panels */
  .al-panel {
    width: 220px;
    flex-shrink: 0;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* Bioluminescent card */
  .al-card {
    background: var(--bg3);
    border: 1px solid rgba(0,229,204,0.18);
    border-radius: 16px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }
  .al-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(0,229,204,0.1), transparent 50%, rgba(170,68,255,0.08) 100%);
    pointer-events: none;
  }
  .al-card.purple-accent {
    border-color: rgba(170,68,255,0.2);
  }
  .al-card.purple-accent::before {
    background: linear-gradient(135deg, rgba(170,68,255,0.1), transparent 50%, rgba(0,229,204,0.06));
  }

  /* Organic inner glow */
  .al-card::after {
    content: '';
    position: absolute;
    top: -20px; left: -20px;
    width: 100px; height: 100px;
    background: radial-gradient(circle, rgba(0,229,204,0.1), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .al-card.purple-accent::after {
    background: radial-gradient(circle, rgba(170,68,255,0.1), transparent 70%);
  }

  .al-card-title {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--teal);
    text-shadow: 0 0 8px rgba(0,229,204,0.6);
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }
  .al-card.purple-accent .al-card-title {
    color: var(--purple);
    text-shadow: 0 0 8px rgba(170,68,255,0.6);
  }

  /* Form elements */
  .al-field { margin-bottom: 10px; position: relative; z-index: 1; }
  .al-field-label { font-size: 0.68rem; color: var(--dim); letter-spacing: 0.8px; margin-bottom: 4px; }
  .al-row { display: flex; gap: 6px; align-items: center; }
  input[type=number] {
    flex: 1;
    background: rgba(0,229,204,0.04);
    border: 1px solid rgba(0,229,204,0.2);
    color: var(--teal);
    padding: 6px 10px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.82rem;
    min-width: 0;
  }
  input[type=number]:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 10px rgba(0,229,204,0.15); }
  .al-card.purple-accent input[type=number] {
    background: rgba(170,68,255,0.04);
    border-color: rgba(170,68,255,0.2);
    color: var(--purple);
  }
  .al-card.purple-accent input[type=number]:focus {
    border-color: var(--purple);
    box-shadow: 0 0 10px rgba(170,68,255,0.15);
  }
  .al-btn {
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    white-space: nowrap;
    position: relative;
  }
  .al-btn-teal {
    background: rgba(0,229,204,0.15);
    color: var(--teal);
    border: 1px solid rgba(0,229,204,0.35);
    box-shadow: 0 0 8px rgba(0,229,204,0.1);
  }
  .al-btn-teal:hover { background: rgba(0,229,204,0.25); box-shadow: 0 0 16px rgba(0,229,204,0.2); }
  .al-btn-purple {
    background: rgba(170,68,255,0.15);
    color: var(--purple);
    border: 1px solid rgba(170,68,255,0.35);
    box-shadow: 0 0 8px rgba(170,68,255,0.1);
  }
  .al-btn-purple:hover { background: rgba(170,68,255,0.25); box-shadow: 0 0 16px rgba(170,68,255,0.2); }
  .al-btn-danger {
    background: rgba(255,50,50,0.1);
    color: #ff6666;
    border: 1px solid rgba(255,50,50,0.25);
  }
  .al-btn-danger:hover { background: rgba(255,50,50,0.2); }
  .al-btn-block { display: block; width: 100%; text-align: center; padding: 7px; margin-top: 6px; }

  /* Organic toggle */
  .al-toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; position: relative; z-index: 1; }
  .al-toggle-label { font-size: 0.75rem; color: var(--dim); }
  .bio-toggle {
    width: 40px; height: 22px;
    background: rgba(0,229,204,0.08);
    border: 1px solid rgba(0,229,204,0.2);
    border-radius: 11px;
    position: relative; cursor: pointer;
    transition: all 0.2s;
  }
  .bio-toggle.on {
    background: rgba(0,229,204,0.2);
    border-color: var(--teal);
    box-shadow: 0 0 10px rgba(0,229,204,0.2);
  }
  .bio-toggle::after {
    content: ''; position: absolute;
    width: 14px; height: 14px;
    background: var(--dim);
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: all 0.2s;
  }
  .bio-toggle.on::after {
    background: var(--teal);
    transform: translateX(18px);
    box-shadow: 0 0 8px var(--teal);
  }

  /* Center: Canvas */
  .al-canvas-area {
    flex: 1;
    position: relative;
    border: 1px solid rgba(0,229,204,0.12);
    border-radius: 16px;
    background: var(--bg);
    overflow: hidden;
  }
  .al-canvas-inner {
    position: absolute; inset: 0;
  }
  /* Deep space background */
  .space-gradient {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(0,100,180,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 60%, rgba(100,0,200,0.06) 0%, transparent 60%);
  }
  .star { position: absolute; background: rgba(255,255,255,0.6); border-radius: 50%; }
  /* Organic-looking objects in space */
  .space-obj {
    position: absolute;
    border-radius: 50%;
    filter: blur(1px);
  }

  /* Player ship - alien vessel */
  .al-ship {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 18px; height: 24px;
    background: radial-gradient(ellipse at 50% 30%, var(--teal), rgba(0,229,204,0.4));
    clip-path: polygon(50% 0%, 100% 85%, 80% 100%, 20% 100%, 0% 85%);
    filter: drop-shadow(0 0 8px var(--teal)) drop-shadow(0 0 20px rgba(0,229,204,0.3));
    animation: bio-pulse 2s ease-in-out infinite;
  }
  @keyframes bio-pulse {
    0%,100% { filter: drop-shadow(0 0 6px var(--teal)); }
    50% { filter: drop-shadow(0 0 14px var(--teal)) drop-shadow(0 0 28px rgba(0,229,204,0.25)); }
  }
  .al-traj {
    position: absolute; top: 50%; left: 50%;
    width: 150px; height: 1px;
    background: linear-gradient(90deg, rgba(0,229,204,0.5), transparent);
    transform-origin: left;
    transform: rotate(-22deg);
  }
  /* Organic range ring */
  .al-ring {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border: 1px solid rgba(0,229,204,0.08);
    border-radius: 50%;
    animation: ring-breathe 3s ease-in-out infinite;
  }
  @keyframes ring-breathe {
    0%,100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.02); }
  }

  /* Canvas overlay chips */
  .canvas-bio-chip {
    position: absolute;
    background: rgba(2,4,16,0.8);
    border: 1px solid rgba(0,229,204,0.2);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 0.72rem;
    color: var(--dim);
    display: flex; align-items: center; gap: 7px;
    backdrop-filter: blur(8px);
    transition: all 0.2s;
    cursor: pointer;
  }
  .canvas-bio-chip:hover { border-color: rgba(0,229,204,0.4); background: rgba(0,229,204,0.06); }
  .canvas-bio-chip.bl { bottom: 14px; left: 14px; }
  .canvas-bio-chip.br { bottom: 14px; right: 14px; border-color: rgba(170,68,255,0.2); }
  .canvas-bio-chip.br:hover { border-color: rgba(170,68,255,0.4); background: rgba(170,68,255,0.06); }

  /* Canvas HUD */
  .canvas-hud {
    position: absolute;
    top: 14px;
    background: rgba(2,4,16,0.7);
    border: 1px solid rgba(0,229,204,0.15);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 0.68rem;
    color: var(--dim);
    backdrop-filter: blur(6px);
  }
  .canvas-hud.left { left: 14px; }
  .canvas-hud.right { right: 14px; }
  .canvas-hud span { color: var(--teal); }

  /* Charge visual — organism-like */
  .bio-charges {
    display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; position: relative; z-index: 1;
  }
  .bio-charge {
    width: 16px; height: 16px;
    background: radial-gradient(circle at 40% 40%, var(--teal), rgba(0,229,204,0.3));
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(0,229,204,0.5);
    animation: charge-glow 2s ease-in-out infinite;
  }
  .bio-charge:nth-child(2) { animation-delay: 0.3s; }
  .bio-charge:nth-child(3) { animation-delay: 0.6s; }
  @keyframes charge-glow {
    0%,100% { box-shadow: 0 0 4px rgba(0,229,204,0.4); }
    50% { box-shadow: 0 0 10px rgba(0,229,204,0.7); }
  }
  .bio-charge.empty {
    background: transparent;
    border: 1px solid rgba(0,229,204,0.15);
    box-shadow: none;
    animation: none;
  }
  .bio-timer { font-size: 0.7rem; color: var(--dim); margin-bottom: 10px; position: relative; z-index: 1; }
  .bio-timer span { color: var(--teal); }

  /* Footer */
  .al-footer {
    background: rgba(2,4,16,0.9);
    border-top: 1px solid rgba(0,229,204,0.1);
    height: 34px;
    display: flex; align-items: center;
    padding: 0 16px; gap: 20px;
    font-size: 0.7rem;
    color: var(--dim);
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .al-footer .fv { color: var(--teal); margin-left: 4px; }
  .al-footer .spacer { flex: 1; }
</style>
</head>
<body>

<!-- Ambient blobs -->
<div class="bg-blob" style="width:600px;height:600px;background:#003060;top:-200px;left:-100px"></div>
<div class="bg-blob" style="width:500px;height:500px;background:#300060;bottom:-150px;right:-100px;animation-delay:-6s"></div>

<div class="al-header">
  <div class="al-logo">SPACEWARS</div>
  <nav class="al-nav">
    <a href="#">Home</a>
    <a href="#" class="active">Game</a>
    <a href="#">Research</a>
    <a href="#">Profile</a>
  </nav>
</div>

<div class="al-body">

  <!-- LEFT: Navigation -->
  <div class="al-panel">
    <div class="al-card">
      <div class="al-card-title">Navigation</div>
      <div class="al-field">
        <div class="al-field-label">Velocity</div>
        <div class="al-row">
          <input type="number" value="24.5" min="0" step="0.1">
          <button class="al-btn al-btn-teal">Set</button>
        </div>
      </div>
      <div class="al-field">
        <div class="al-field-label">Heading °</div>
        <div class="al-row">
          <input type="number" value="135.0" min="0" max="360" step="0.1">
          <button class="al-btn al-btn-teal">Set</button>
        </div>
      </div>
      <button class="al-btn al-btn-teal al-btn-block">↑ Maximum Thrust</button>
      <button class="al-btn al-btn-danger al-btn-block">■ Emergency Stop</button>
    </div>

    <div class="al-card">
      <div class="al-card-title">Combat</div>
      <div class="al-toggle-row">
        <span class="al-toggle-label">Attack on contact</span>
        <div class="bio-toggle"></div>
      </div>
    </div>
  </div>

  <!-- CENTER: Canvas -->
  <div class="al-canvas-area">
    <div class="al-canvas-inner">
      <div class="space-gradient"></div>
      <div class="star" style="width:2px;height:2px;top:8%;left:12%"></div>
      <div class="star" style="width:1px;height:1px;top:22%;left:55%"></div>
      <div class="star" style="width:2px;height:2px;top:55%;left:80%"></div>
      <div class="star" style="width:1px;height:1px;top:72%;left:32%"></div>
      <div class="star" style="width:2px;height:2px;top:18%;left:85%"></div>
      <div class="star" style="width:1px;height:1px;top:42%;left:6%"></div>
      <div class="star" style="width:2px;height:2px;top:85%;left:65%"></div>
      <!-- Alien objects -->
      <div class="space-obj" style="top:28%;left:62%;width:20px;height:16px;background:rgba(0,229,204,0.4);filter:blur(2px)"></div>
      <div class="space-obj" style="top:65%;left:28%;width:14px;height:14px;background:rgba(170,68,255,0.3);filter:blur(2px)"></div>
      <div class="al-ring" style="width:130px;height:130px"></div>
      <div class="al-ring" style="width:260px;height:260px;animation-delay:-1.5s"></div>
      <div class="al-ship"></div>
      <div class="al-traj"></div>
      <!-- Canvas overlays -->
      <div class="canvas-hud left">POS <span>2450 × 1870</span></div>
      <div class="canvas-hud right">SYS <span>ONLINE</span></div>
      <div class="canvas-bio-chip bl">
        <div class="bio-toggle"></div>
        Attack
      </div>
      <div class="canvas-bio-chip br">
        <div class="bio-toggle on"></div>
        <span style="color:rgba(170,68,255,0.8)">Teleport</span>
      </div>
    </div>
  </div>

  <!-- RIGHT: Teleport + Settings -->
  <div class="al-panel">
    <div class="al-card purple-accent" style="flex:1">
      <div class="al-card-title">Phase Jump</div>
      <div class="bio-charges">
        <div class="bio-charge"></div>
        <div class="bio-charge"></div>
        <div class="bio-charge"></div>
        <div class="bio-charge empty"></div>
        <div class="bio-charge empty"></div>
      </div>
      <div class="bio-timer">3 / 5 energized — next: <span>2m 14s</span></div>
      <div class="al-field">
        <div class="al-field-label">Target X</div>
        <input type="number" value="2450" min="0" max="5000" style="width:100%;border-color:rgba(170,68,255,0.2);background:rgba(170,68,255,0.04);color:var(--purple)">
      </div>
      <div class="al-field">
        <div class="al-field-label">Target Y</div>
        <input type="number" value="1870" min="0" max="5000" style="width:100%;border-color:rgba(170,68,255,0.2);background:rgba(170,68,255,0.04);color:var(--purple)">
      </div>
      <button class="al-btn al-btn-purple al-btn-block">⚡ Initiate Jump</button>
    </div>

    <div class="al-card">
      <div class="al-card-title">Display</div>
      <div class="al-toggle-row" style="margin-bottom:0">
        <span class="al-toggle-label">Debug overlay</span>
        <div class="bio-toggle on"></div>
      </div>
      <div style="font-size:0.68rem;color:var(--dim);margin-top:10px;position:relative;z-index:1">
        Data age: <span style="color:var(--teal)">1.2s</span>
      </div>
    </div>
  </div>

</div>

<div class="al-footer">
  <span>Vel<span class="fv">24.5</span></span>
  <span>Hdg<span class="fv">135°</span></span>
  <span>X<span class="fv">2450</span></span>
  <span>Y<span class="fv">1870</span></span>
  <span class="spacer"></span>
  <span>Sync<span class="fv">1.2s</span></span>
</div>

</body>
</html>
