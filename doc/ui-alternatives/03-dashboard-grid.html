<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design 3: Dashboard Grid</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .navbar {
    background: #111;
    border-bottom: 1px solid #222;
    padding: 0 20px;
    height: 50px;
    display: flex; align-items: center; gap: 24px;
  }
  .logo { color: #4caf50; font-weight: 700; font-size: 1rem; letter-spacing: 2px; }
  .navbar a { color: #777; text-decoration: none; font-size: 0.85rem; }
  .navbar a.active { color: #4caf50; }

  /* Dashboard: 3-column grid */
  .dashboard {
    flex: 1;
    display: grid;
    grid-template-columns: 220px 1fr 220px;
    grid-template-rows: 1fr auto;
    gap: 12px;
    padding: 12px;
  }

  /* Left column: attack + navigation */
  .col-left {
    display: flex; flex-direction: column; gap: 12px;
  }

  /* Center: canvas */
  .col-center {
    display: flex; align-items: center; justify-content: center;
    grid-row: 1 / 3;
  }

  /* Right column: teleport + settings */
  .col-right {
    display: flex; flex-direction: column; gap: 12px;
  }

  /* Bottom row: spans left+right (not center) is handled by grid placement */

  .canvas-box {
    background: #050512;
    border: 1px solid #1a1a3a;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
    width: 100%;
    aspect-ratio: 1;
    max-width: 620px;
    max-height: calc(100vh - 74px);
  }

  /* Stars / space decorations */
  .star { position: absolute; background: rgba(255,255,255,0.7); border-radius: 50%; }
  .ship-icon {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px; filter: drop-shadow(0 0 6px #4caf50);
  }
  .traj {
    position: absolute; top: 50%; left: 50%;
    width: 160px; height: 1px;
    background: linear-gradient(90deg, rgba(76,175,80,0.7), transparent);
    transform-origin: left;
    transform: rotate(-25deg);
  }

  /* Cards */
  .card {
    background: #161616;
    border: 1px solid #272727;
    border-radius: 10px;
    padding: 14px 16px;
  }
  .card-title {
    color: #4caf50;
    font-size: 0.7rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::after {
    content: ''; flex: 1; height: 1px; background: rgba(76,175,80,0.2);
  }

  /* Form elements */
  .field { margin-bottom: 10px; }
  .field-label { font-size: 0.72rem; color: #666; margin-bottom: 4px; }
  .field-row { display: flex; gap: 6px; }
  input[type=number] {
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #333;
    color: #e0e0e0;
    padding: 6px 8px;
    border-radius: 5px;
    font-size: 0.82rem;
    min-width: 0;
  }
  input[type=number]:focus { outline: none; border-color: #4caf50; }
  .btn {
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .btn-green { background: #4caf50; color: #fff; }
  .btn-green:hover { background: #45a049; }
  .btn-red { background: #c62828; color: #fff; }
  .btn-ghost {
    background: transparent;
    border: 1px solid #4caf50;
    color: #4caf50;
  }
  .btn-block { display: block; width: 100%; padding: 7px; margin-top: 6px; text-align: center; }

  /* Toggle */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .toggle-text { font-size: 0.8rem; color: #aaa; }
  .pill {
    width: 34px; height: 18px;
    background: #333; border-radius: 9px;
    position: relative; cursor: pointer; border: 1px solid #555; flex-shrink: 0;
  }
  .pill.on { background: #4caf50; border-color: #4caf50; }
  .pill::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    background: #fff; border-radius: 50%;
    top: 2px; left: 2px;
    transition: transform 0.2s;
  }
  .pill.on::after { transform: translateX(16px); }

  /* Charge dots */
  .charges-row { display: flex; gap: 5px; margin-bottom: 6px; align-items: center; }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #4caf50;
    box-shadow: 0 0 5px rgba(76,175,80,0.6);
  }
  .dot.empty { background: #2a2a2a; box-shadow: none; border: 1px solid #444; }
  .charges-text { font-size: 0.75rem; color: #888; margin-left: 4px; }
  .timer { font-size: 0.72rem; color: #555; margin-bottom: 8px; }

  /* Stat readouts on canvas corners */
  .canvas-stat {
    position: absolute;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(76,175,80,0.2);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 0.72rem;
    color: #888;
  }
  .canvas-stat span { color: #4caf50; }
  .stat-tl { top: 10px; left: 10px; }
  .stat-tr { top: 10px; right: 10px; }
  .stat-bl { bottom: 10px; left: 10px; }
  .stat-br { bottom: 10px; right: 10px; }
</style>
</head>
<body>

<nav class="navbar">
  <span class="logo">⚡ SPACEWARS</span>
  <a href="#">Home</a>
  <a href="#" class="active">Game</a>
  <a href="#">Research</a>
  <a href="#">Profile</a>
</nav>

<div class="dashboard">

  <!-- LEFT COLUMN -->
  <div class="col-left">

    <!-- Combat card -->
    <div class="card">
      <div class="card-title">Combat</div>
      <div class="toggle-row">
        <span class="toggle-text">Attack on click</span>
        <div class="pill"></div>
      </div>
    </div>

    <!-- Navigation card -->
    <div class="card" style="flex:1">
      <div class="card-title">Navigation</div>
      <div class="field">
        <div class="field-label">Speed</div>
        <div class="field-row">
          <input type="number" value="24.5" min="0" step="0.1">
          <button class="btn btn-green">Set</button>
        </div>
      </div>
      <div class="field">
        <div class="field-label">Heading °</div>
        <div class="field-row">
          <input type="number" value="135.0" min="0" max="360" step="0.1">
          <button class="btn btn-green">Set</button>
        </div>
      </div>
      <div class="field-row" style="gap:6px">
        <button class="btn btn-ghost btn-block" style="flex:1;margin-top:0">Max Speed</button>
        <button class="btn btn-red" style="padding:6px 12px">Stop</button>
      </div>
    </div>

  </div>

  <!-- CENTER: Canvas -->
  <div class="col-center">
    <div class="canvas-box">
      <div class="star" style="width:2px;height:2px;top:10%;left:15%"></div>
      <div class="star" style="width:1px;height:1px;top:25%;left:50%"></div>
      <div class="star" style="width:2px;height:2px;top:60%;left:75%"></div>
      <div class="star" style="width:1px;height:1px;top:80%;left:30%"></div>
      <div class="star" style="width:2px;height:2px;top:15%;left:85%"></div>
      <div class="star" style="width:1px;height:1px;top:45%;left:5%"></div>
      <div class="star" style="width:2px;height:2px;top:70%;left:55%"></div>
      <div class="ship-icon">🛸</div>
      <div class="traj"></div>
      <div class="canvas-stat stat-tl">Speed: <span>24.5</span></div>
      <div class="canvas-stat stat-tr">Hdg: <span>135°</span></div>
      <div class="canvas-stat stat-bl">X: <span>2,450</span></div>
      <div class="canvas-stat stat-br">Y: <span>1,870</span></div>
    </div>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="col-right">

    <!-- Teleport card -->
    <div class="card" style="flex:1">
      <div class="card-title">Teleport</div>
      <div class="charges-row">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot empty"></div>
        <div class="dot empty"></div>
        <span class="charges-text">3 / 5</span>
      </div>
      <div class="timer">Next charge: 2m 14s</div>
      <div class="field">
        <div class="field-label">X Coordinate</div>
        <input type="number" value="2450" min="0" max="5000" style="width:100%">
      </div>
      <div class="field">
        <div class="field-label">Y Coordinate</div>
        <input type="number" value="1870" min="0" max="5000" style="width:100%">
      </div>
      <div class="field-row" style="gap:6px">
        <button class="btn btn-green btn-block" style="margin-top:0;flex:1">Teleport</button>
        <button class="btn btn-ghost" style="padding:6px 10px;margin-top:0">Click</button>
      </div>
    </div>

    <!-- Settings card -->
    <div class="card">
      <div class="card-title">View</div>
      <div class="toggle-row" style="margin-bottom:0">
        <span class="toggle-text">Debug drawings</span>
        <div class="pill on"></div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
